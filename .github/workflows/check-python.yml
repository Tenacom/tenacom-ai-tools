name: Check Python

on:
  pull_request:
  push:
    branches: [ main, develop, 'develop/**' ]

# Supersede a running check when a pull request is pushed again, but never cancel a
# branch check: main and develop must always end up with a verdict on their tip.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:

  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      # The interpreter is pinned only to keep a runner image bump from perturbing the
      # gate. It does not decide the verdict: ruff and pyright both target py39 through
      # their own configuration, whatever Python they run on.
      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: requirements-dev.txt
      # Nothing to cache for pyright: the pinned PyPI wrapper bundles the pyright JS
      # distribution in its own wheel, and runs it on the Node the runner image ships.
      # It only downloads an npm package when asked for a version other than the bundled
      # one, through PYRIGHT_PYTHON_FORCE_VERSION or PYRIGHT_PYTHON_PYLANCE_VERSION.
      - name: Build developer tooling
        run: make tools
      # Both tools run even when the first one fails, so one push reports every problem.
      # Ruff emits GitHub annotations on request; pyright has no such output format, so
      # its plain output is annotated by a problem matcher instead.
      - name: Lint
        run: make lint
        env:
          RUFF_OUTPUT_FORMAT: github
      - name: Type check
        if: ${{ !cancelled() }}
        run: |
          echo "::add-matcher::.github/problem-matchers/pyright.json"
          make typecheck
